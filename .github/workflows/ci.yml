name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ■■ Job 1: Lint and type check (runs immediately on every push) ■■
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ■■ Job 2: Tests (runs in parallel with lint) ■■■■■■■■■■■■■■■■■■■■
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  # ■■ Job 3: Security scan (only after tests pass) ■■■■■■■■■■■■■■■■■
  security:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  # ■■ Job 4: Build verify (only after tests pass) ■■■■■■■■■■■■■■■■■■
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
